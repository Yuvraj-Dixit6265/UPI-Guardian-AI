apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: upi-guardian-hpa

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: upi-guardian-app

  minReplicas: 3
  maxReplicas: 10

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70