apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: upi-guardian-ingress

spec:
  rules:
    - host: upi-guardian.local

      http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: upi-guardian-service

                port:
                  number: 80