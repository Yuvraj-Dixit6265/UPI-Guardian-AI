name: UPI Guardian AI CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:

  test:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r banking-api/requirements.txt

      - name: Validate Imports
        run: |
          python -c "import fastapi"
          python -c "import sqlalchemy"
          python -c "import redis"

      - name: Verify Kubernetes Files
        run: |
          test -f kubernetes/deployment.yaml
          test -f kubernetes/service.yaml
          test -f kubernetes/configmap.yaml
          test -f kubernetes/secret.yaml
          test -f kubernetes/hpa.yaml
          test -f kubernetes/ingress.yaml

  docker:

    needs: test

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
          -f Dockerfile.prod \
          -t ghcr.io/yuvraj-dixit6265/upi-guardian-ai:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push ghcr.io/yuvraj-dixit6265/upi-guardian-ai:${{ github.sha }}

  deploy:

    needs: docker

    runs-on: ubuntu-latest

    steps:
      - name: Deployment Placeholder
        run: |
          echo "Future deployment stage"
          echo "Render / Kubernetes deployment goes here"