services:

  postgres:
    image: postgres:16
    container_name: upi-guardian-postgres
    environment:
      POSTGRES_USER: upi_admin
      POSTGRES_PASSWORD: upi_password
      POSTGRES_DB: upi_guardian
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: upi-guardian-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: upi-guardian-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: upi-guardian-grafana
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data: