global:
  scrape_interval: 5s

rule_files:
  - /etc/prometheus/rules/alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "upi-guardian"

    metrics_path: /metrics

    static_configs:
      - targets:
          - upi-guardian-service:80