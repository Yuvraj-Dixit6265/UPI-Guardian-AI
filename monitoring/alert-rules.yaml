apiVersion: v1
kind: ConfigMap

metadata:
  name: prometheus-alert-rules

data:
  alert-rules.yml: |
    groups:

      - name: upi-guardian-alerts

        rules:

          - alert: ApplicationDown

            expr: up == 0

            for: 1m

            labels:
              severity: critical

            annotations:
              summary: "UPI Guardian Application Down"

              description: "Application unreachable for 1 minute"

          - alert: HighCPUUsage

            expr: process_cpu_seconds_total > 0.8

            for: 2m

            labels:
              severity: warning

            annotations:
              summary: "High CPU Usage"

              description: "CPU usage exceeded threshold"